{% extends 'reservation/base.html' %}
{% load static %}

{% block title %}회원가입 - 장비 예약 시스템{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-body p-5">
                <h2 class="text-center mb-4">회원가입</h2>
                <form action="{% url 'signup' %}" method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">아이디</label>
                        <input type="text" name="username" class="form-control" id="id_username"
                            placeholder="아이디를 입력하세요" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_realname" class="form-label">이름</label>
                        <input type="text" name="realname" class="form-control" id="id_realname" placeholder="이름을 입력하세요"
                            required>
                    </div>
                    <div class="mb-3">
                        <label for="id_email" class="form-label">이메일 주소</label>
                        <input type="email" name="email" class="form-control" id="id_email"
                            placeholder="email@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_password1" class="form-label">비밀번호</label>
                        <input type="password" name="password1" class="form-control" id="id_password1"
                            placeholder="비밀번호" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_password2" class="form-label">비밀번호 확인</label>
                        <input type="password" name="password2" class="form-control" id="id_password2"
                            placeholder="비밀번호 확인" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">가입하기</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <p class="text-muted">이미 계정이 있으신가요? <a href="{% url 'login' %}">로그인</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
